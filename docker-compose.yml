services:
  joblio:
    build: .
    container_name: joblio
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      JOBLIO_ALLOW_REMOTE: 1
      JOBLIO_SETUP_NON_INTERACTIVE: 1
      JOBLIO_SETUP_USER: joblio
      JOBLIO_SETUP_PASSWORD: change-this-strong-password
      JOBLIO_SETUP_TLS_MODE: off
    volumes:
      - ./docker-data:/app/.joblio-data
